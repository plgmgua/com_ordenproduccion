COM_ORDENPRODUCCION_CONFIG_TELEGRAM_BROADCAST_MESSAGE_PAYMENT_PROOF_VERIFIED_LABEL="Canal: mensaje comprobante verificado"
COM_ORDENPRODUCCION_CONFIG_TELEGRAM_BROADCAST_MESSAGE_PAYMENT_PROOF_VERIFIED_DESC="Opcional. Solo para el canal. Vacío = reutiliza el mensaje DM de comprobante verificado."
