COM_ORDENPRODUCCION_CONFIG_TELEGRAM_QUEUE_CRON_KEY_DESC="Secreto de la URL de la cola (?cron_key=…). Deje en blanco al guardar para conservar la clave. Telegram envía cuando se llama esa URL (p. ej. cada 2 minutos con crontab)."
COM_ORDENPRODUCCION_CONFIG_TELEGRAM_MISMATCH_ANCHOR_ENABLED_LABEL="Caso diferencia: mensajes ancla en Telegram"
COM_ORDENPRODUCCION_CONFIG_TELEGRAM_MISMATCH_ANCHOR_ENABLED_DESC="Si un comprobante se guarda con diferencia de totales, encolar un DM aparte para cada dueño de orden vinculada que tenga Telegram enlazado (misma cola de salida que el resto del bot). Al enviarlo el cron, el bot registra el mensaje para comentarios por respuesta. Los usuarios de Administración no reciben este ancla."
COM_ORDENPRODUCCION_CONFIG_TELEGRAM_WEBHOOK_PUBLIC_BASE_LABEL="URL base pública del webhook (opcional)"
COM_ORDENPRODUCCION_CONFIG_TELEGRAM_WEBHOOK_PUBLIC_BASE_DESC="Origen HTTPS (esquema + host, sin ruta ni barra final) donde Telegram hace POST — p. ej. https://telegram.grantsolutions.cc. Deje el valor por defecto para el host dedicado. La misma instancia Joomla debe responder ahí. Se usa en setWebhook, la URL completa debajo y en el JSON de bot info (expected_webhook_url)."
COM_ORDENPRODUCCION_CONFIG_TELEGRAM_WEBHOOK_SECRET_LABEL="Secreto del webhook del bot"
COM_ORDENPRODUCCION_CONFIG_TELEGRAM_WEBHOOK_SECRET_DESC="Debe coincidir con secret_token en setWebhook de Telegram. Las peticiones deben incluir la cabecera X-Telegram-Bot-Api-Secret-Token. URL del webhook (POST): index.php?option=com_ordenproduccion&controller=telegram&task=webhook&format=raw — vacío rechaza todas las llamadas."

