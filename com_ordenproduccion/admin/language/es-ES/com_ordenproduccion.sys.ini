COM_ORDENPRODUCCION_CONFIG_TELEGRAM_BROADCAST_CHAT_ID_DESC="Use el ID numérico del chat (en canales suele empezar por -100…), no el @nombre del canal. Añada primero este bot como administrador del canal con permiso de publicar. Obtenga el ID (p. ej. reenvíe un mensaje del canal a @userinfobot o @getidsbot). Guarde antes de probar."
