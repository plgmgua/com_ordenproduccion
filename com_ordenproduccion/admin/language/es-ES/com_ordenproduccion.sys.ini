COM_ORDENPRODUCCION_CONFIG_TELEGRAM_BROADCAST_MESSAGE_ENVIO_DESC="Opcional. Texto usado solo para la notificación de envío al canal Administración. Vacío = reutiliza el mensaje DM de envío."
