COM_ORDENPRODUCCION_CONFIG_TELEGRAM_WEBHOOK_PUBLIC_BASE_DESC="HTTPS origin (scheme + host, no path, no trailing slash) where Telegram POSTs updates — e.g. https://telegram.grantsolutions.cc. Leave as default for the dedicated Telegram host. The same Joomla instance must answer on that host. Used for setWebhook, the full webhook URL below, and bot info JSON (expected_webhook_url)."
COM_ORDENPRODUCCION_CONFIG_TELEGRAM_WEBHOOK_SECRET_LABEL="Bot webhook secret"
COM_ORDENPRODUCCION_CONFIG_TELEGRAM_WEBHOOK_SECRET_DESC="Must match the secret_token set in Telegram setWebhook. Requests must send header X-Telegram-Bot-Api-Secret-Token. Webhook URL (POST): index.php?option=com_ordenproduccion&controller=telegram&task=webhook&format=raw — leave empty to reject all webhook calls."

